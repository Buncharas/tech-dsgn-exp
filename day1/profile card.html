<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/typography.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!--Boxicons-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="profile-card">
        <div class="image">
            <div class="inner-circle"></div>
            <img src="me2.png" alt="class=" profile-img">
        </div>
        <div class="text-data">
            <span class="name">Buncharas Siriphosakul</span>
            <span class="job">ID chula student</span>
            <span class="aboutme">An industrial design student who loves to design and create new things.</span>
        </div>


        <div class="media-button">
            <a href="#" style="background-color: #4267b2;" class="link">
                <i class='bx bxl-facebook'></i></a>
            <a href="#" style="background-color: #1da1f2;" class="link">
                <i class='bx bxl-twitter'></i></a>
            <a href="#" style="background-color: #e1306c;" class="link">
                <i class='bx bxl-instagram'></i></a>
            <a href="#" style="background-color: #ff0000;" class="link">
                <i class='bx bxl-youtube'></i></a>
        </div>

        <div class="buttons">
            <button class="button">My Portfolio</button>
            <button class="button">Contact Me</button>
        </div>

    </div>

</body>

</html>
